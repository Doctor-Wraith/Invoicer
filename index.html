<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoicer</title>
    <link rel="stylesheet" href="css/primary_layout.css">
    <link rel="stylesheet" href="css/tabs.css">
    <link rel="stylesheet" href="css/product.css">
    <script src="js/tabs.js"></script>
    <script src="js/products.js"></script>
</head>
<body>
    <div class="main-wrapper" id="main-wrapper">
        <div class="user-input-wrapper">
            <div class="user-input-header header">
                <h3>Invoice Details</h3>
            </div>
            <div class="user-input-content content">
                <div class="content-wrapper">
                        <div class="tab-wrapper">
                            <div class="tab">
                                <button class="tablinks" onclick="openTab(event, 'Product')" id="openDefault">Products</button>
                                <button class="tablinks" onclick="openTab(event, 'Customer')">Customer</button>
                                <button class="tablinks" onclick="openTab(event, 'Invoice')">Invoice</button>
                                <button class="tablinks" onclick="openTab(event, 'Payment')">Payment</button>
                                <button class="tablinks" onclick="openTab(event, 'Company')">Company</button>
                            </div>
                    </div>
                

                    <div class="tabcontent" id="Product">
                        <div class="product-header">
                            <h2>Products</h2>
                            <div class="products-buttons">
                                <button onclick="addProduct()">+ Add Product</button>
                            </div>
                        </div>
                        
                        <div class="pruducts-list-wrapper">
                            <div class="pruducts-list">
                                <!-- Header                       -->
                                 <div class="product-list-header">
                                    <div style="flex: 6;">Name</div>
                                    <div style="flex: 4;">Model/SKU</div>
                                    <div style="flex: 4;">Quantity</div>
                                    <div style="flex: 4;">Price</div>
                                    <div style="flex: 1;"></div>
                                 </div>

                                 <!-- Rows -->
                                <div id="rows"></div>
                            </div>

                            <div class="button-holder">
                                <button class="add-product" onclick="addProduct()">Add Product</button>
                            </div>
                        </div>

                    </div>

                    <div class="tabcontent" id="Customer">
                        <h3>Customer</h3>
                        <p>Place Holder for Customer</p>
                    </div>

                    <div class="tabcontent" id="Invoice">
                        <h3>Invoice</h3>
                        <p>Place Holder for Invoice</p>
                    </div>

                    <div class="tabcontent" id="Payment">
                        <h3>Payment</h3>
                        <p>Place Holder for Payment</p>
                    </div>

                    <div class="tabcontent" id="Company">
                        <h3>Company</h3>
                        <p>Place Holder for Company</p>
                    </div>

                </div>
            </div>
        </div>
        <div class="preview-wrapper">
            <div class="preview-input-header header">
                <h3>Preview</h3>
            </div>
            <div class="preview-input-content content">
                
            </div>
        </div>
    </div>
</body>
<script>
    document.getElementById("openDefault").click();
    addProduct()
</script>
</html>
